# lefthook.yml — Playwright / TypeScript repo
# SYNC-MANAGED (base guards). Stack-specific hooks below are repo-owned.
# See shared-docs/docs/adr/ADR-013-multirepo-sync-strategy.md

min_version: 1.6.0

pre-commit:
  parallel: true
  commands:
    # ── Universal guards (sync-managed) ─────────────────────────────────────

    no-search-engine:
      glob: '**/*.ts'
      run: |
        if grep -rn "bing\|google\.com\|search-engine\|SearchEngine" {staged_files} 2>/dev/null | grep -v "//"; then
          echo "❌ Search-engine reference found. See ADR decommission plan."
          exit 1
        fi

    no-assertions-in-poms:
      glob: '{pages,locators,components}/**/*.ts'
      run: |
        if grep -n "expect(\|\.should(\|toBeVisible\|toHaveText" {staged_files} 2>/dev/null; then
          echo "❌ Assertion found in pages/locators/components. Violates Law 2."
          exit 1
        fi

    no-selectors-in-tests:
      glob: '{tests,e2e}/**/*.{ts,feature}'
      run: |
        if grep -n "page\.locator(\|page\.getBy\|page\.getByTestId" {staged_files} 2>/dev/null; then
          echo "❌ Selector literal found in tests/. Violates Law 3."
          exit 1
        fi

    # ── Stack-specific linting ───────────────────────────────────────────────

    eslint:
      glob: '**/*.ts'
      run: pnpm exec eslint {staged_files} --max-warnings 0

    tsc:
      glob: '**/*.ts'
      run: pnpm exec tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
