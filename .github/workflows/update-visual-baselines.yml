name: Update Visual Baselines

# Manually trigger this to regenerate Linux baselines after intentional UI changes.
# The workflow runs visual tests with --update-snapshots on ubuntu-latest, then
# commits the new *-linux.png files back to the branch.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update baselines on'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Delete macOS baselines
        run: |
          find tests/ui/visual/visual-regression.spec.ts-snapshots/ -name '*-darwin.png' -delete
          echo "Removed macOS (-darwin) baseline files."

      - name: Run visual tests and update snapshots
        env:
          BASE_URL: 'https://www.saucedemo.com'
        run: |
          pnpm exec playwright test --grep @visual --update-snapshots --project chromium || true

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/ui/visual/visual-regression.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore: update Playwright visual baselines (linux) [skip ci]"
            git push
          fi
