name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - playwright
          - bdd

jobs:
  full-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run unit tests
        run: pnpm run test:unit
      - name: Run Playwright tests
        if: ${{ inputs.test_type == 'all' || inputs.test_type == 'playwright' }}
        env:
          CI: 'true'
        run: pnpm exec playwright test --reporter=list,allure-playwright
      - name: Run BDD tests
        if: ${{ inputs.test_type == 'all' || inputs.test_type == 'bdd' }}
        env:
          CI: 'true'
        run: cd tests/bdd && pnpm exec bddgen && pnpm exec playwright test
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
