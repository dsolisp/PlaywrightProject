name: Full Test Suite

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui-sauce
          - ui-practice
          - backend
          - visual
          - a11y
          - performance
          - bdd

concurrency:
  group: full-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run Sauce UI tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'ui-sauce' }}
        run: pnpm run test:sauce

      - name: Run Practice UI tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'ui-practice' }}
        run: pnpm run test:practice

      - name: Run Backend tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'backend' }}
        run: pnpm run test:backend

      - name: Run Visual tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'visual' }}
        run: pnpm run test:visual

      - name: Run Accessibility tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'a11y' }}
        run: pnpm run test:a11y

      - name: Run Performance tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'performance' }}
        run: pnpm run test:perf

      - name: Run BDD tests
        if: ${{ inputs.suite == 'all' || inputs.suite == 'bdd' }}
        run: cd tests/bdd && pnpm exec bddgen && pnpm exec playwright test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
