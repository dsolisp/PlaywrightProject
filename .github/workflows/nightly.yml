name: Nightly Test Suite

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HEADLESS: true
      CI: 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run Sauce UI tests
        run: pnpm run test:sauce || true

      - name: Run Practice UI tests
        run: pnpm run test:practice || true

      - name: Run Backend tests
        run: pnpm run test:backend || true

      - name: Run Visual tests
        run: pnpm run test:visual || true

      - name: Run Accessibility tests
        run: pnpm run test:a11y || true

      - name: Run Performance tests
        run: pnpm run test:perf || true

      - name: Run BDD tests
        run: cd tests/bdd && pnpm exec bddgen && pnpm exec playwright test || true

      - name: Upload Allure results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/

      - name: Generate metrics summary.json
        if: always()
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          TEST_SUITE: nightly
          ALLURE_RESULTS_DIR: allure-results
        run: node scripts/generate_summary_json.js

      - name: Upload summary.json to Cloudflare R2 (metrics)
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp summary.json s3://qa-portfolio-metrics/${{ github.event.repository.name }}/${{ github.run_id }}.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Report to Cloudflare R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync allure-report/ s3://qa-portfolio-allure/${{ github.event.repository.name }}/${{ github.run_id }}/ --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Add Report URL to Summary
        if: always()
        run: |
          echo "### 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "[View Full Report](${{ secrets.R2_PUBLIC_URL }}/${{ github.event.repository.name }}/${{ github.run_id }}/index.html)" >> $GITHUB_STEP_SUMMARY
